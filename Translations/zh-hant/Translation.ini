INI:Controls:GameOptionsPanel:chkSelectedDisplayExpand:ToolTip=底邊欄始戲時顯所有單位圖標（不排序），否則自動收納同類並於左上角顯數（排序）。
INI:Controls:GameOptionsPanel:chkDrawAdjacentBoundary:Text=建造邊界顯示
INI:Controls:GameOptionsPanel:chkDrawAdjacentBoundary:ToolTip=顯建築建造判定邊界。
INI:Controls:GameOptionsPanel:chkShowBuildingStatistics:Text=建築數量顯示
INI:Controls:GameOptionsPanel:chkShowBuildingStatistics:ToolTip=建築圖標右上角顯當前擁有該類型數。
INI:Controls:GameOptionsPanel:chkMessageDisplayInCenter:Text=字幕居中
INI:Controls:GameOptionsPanel:chkMessageDisplayInCenter:ToolTip=直於屏幕中央顯字幕，非左上，背景半透，鼠標懸浮時增不透明度，@且期間不消失（字幕區域不判寬，只判高），類RA3。
INI:Controls:GameOptionsPanel:chkEnableSelectBox:Text=單位選擇框
INI:Controls:GameOptionsPanel:chkEnableSelectBox:ToolTip=選中單位後繪選擇框，僅觀戰與袍澤可見。
INI:Controls:GameOptionsPanel:chkEnableAutoCombatBuilding:Text=自動放置防御建築
INI:Controls:GameOptionsPanel:chkEnableAutoCombatBuilding:ToolTip=啓用後，防御建築無需手動點圖標，成後自放。他描述同“自動放置建築”選項。
INI:Controls:GameOptionsPanel:chkEnableAutoBuilding:Text=自動放置建築
INI:Controls:GameOptionsPanel:chkEnableAutoBuilding:ToolTip=啓用後，所有建築無需手動點圖標，成後自放。@可從快捷鍵設第一、第二集結點，自動放置之科技建築隨機置於集結點附近，@防御建築隨機置於第二集結點附近。即便未啓，@卿仍可於戲內右鍵主建/防建選項卡或用快捷鍵臨時啓用。
INI:Controls:GameOptionsPanel:chkShowFlashOnSelecting:Text=單位選中閃爍
INI:Controls:GameOptionsPanel:chkShowFlashOnSelecting:ToolTip=啓用後，單位被選中時閃爍。
INI:Controls:GameOptionsPanel:chkTypeSelectUseIFVMode:Text=步兵車篩選
INI:Controls:GameOptionsPanel:chkTypeSelectUseIFVMode:ToolTip=啓用後，按T鍵選中多功能步兵車類單位時，選同模式步兵車，而非全選。