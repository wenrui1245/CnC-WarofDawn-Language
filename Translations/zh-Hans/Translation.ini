INI:Controls:UpdaterOptionsPanel:lblUpdateChannelDescription:Text=**警告**: 使用非主线通道可能会带来意想不到的错误或行为。@这些通道旨在公开测试即将发布的功能。请使用@Discord 报告任何问题，并确保提及您正在使用的更新通道。
INI:Controls:MultiplayerGameLobby:chkAutoSave:Text=自动保存
INI:Controls:MultiplayerGameLobby:chkAutoSave:ToolTip=每经过 60 FPS 下的 2 分钟自动保存一次游戏。
INI:Controls:SkirmishLobby:chkAutoSave:Text=自动保存
INI:Controls:SkirmishLobby:chkAutoSave:ToolTip=每经过 60 FPS 下的 2 分钟自动保存一次游戏。
INI:Controls:GameOptionsPanel:chkTooltipsExtra:Text=单位描述
INI:Controls:GameOptionsPanel:chkTooltipsExtra:ToolTip=在工具提示中显示单位描述。
INI:Controls:GameOptionsPanel:chkToolTipBlur:Text=工具提示模糊
INI:Controls:GameOptionsPanel:chkToolTipBlur:ToolTip=为工具提示的背景添加模糊效果，该效果会在一定程度上影响性能。
INI:Controls:GameOptionsPanel:chkTooltips:ToolTip=启用游戏内的工具提示条。
INI:Controls:GameOptionsPanel:chkPrioritySelection:Text=框选过滤
INI:Controls:GameOptionsPanel:chkPrioritySelection:ToolTip=若开启，非作战单位（比如矿车）不会与作战单位一同被框选。
INI:Controls:GameOptionsPanel:chkBuildingPlacement:Text=显示建筑放置预览
INI:Controls:GameOptionsPanel:chkBuildingPlacement:ToolTip=当开启时，放置建筑时会显示其预览图像。
INI:Controls:GameOptionsPanel:chkShowDesignator:Text=显示超武可用范围
INI:Controls:GameOptionsPanel:chkShowDesignator:ToolTip=如果开启，释放超武时可以看到抑制者与指示者的作用范围。
INI:Controls:GameOptionsPanel:chkSaveGameOnScenarioStart:Text=跳过自动存档
INI:Controls:GameOptionsPanel:chkSaveGameOnScenarioStart:ToolTip=如果开启，游戏不会在战役开始时存档。
INI:Controls:GameOptionsPanel:chkDigitalDisplay:Text=数值显示
INI:Controls:GameOptionsPanel:chkDigitalDisplay:ToolTip=如果开启，游戏内会在你选中单位时在其身旁显示更多数据（如血量、经验等）。
INI:Controls:GameOptionsPanel:chkShowHarvesterCounter:Text=矿车计数器
INI:Controls:GameOptionsPanel:chkShowHarvesterCounter:ToolTip=如果开启，侧边栏上方会显示目前正在工作的矿车/总矿车数。
INI:Controls:GameOptionsPanel:chkShowPowerDelta:Text=电量计数
INI:Controls:GameOptionsPanel:chkShowPowerDelta:ToolTip=如果开启，侧边栏上方会显示当前电量。
INI:Controls:GameOptionsPanel:chkSelectedDisplay:Text=底边栏信息
INI:Controls:GameOptionsPanel:chkSelectedDisplay:ToolTip=选中单位后会在界面左下角显示当前单位的相关信息；@同时选中多种单位时，可通过单击左下角单位的图标来选中某一类单位。
INI:Controls:GameOptionsPanel:chkSelectedDisplayExpand:Text=底边栏信息扩展
INI:Controls:GameOptionsPanel:chkSelectedDisplayExpand:ToolTip=底边栏在开始游戏时显示所有单位的图标（不会排序），否则会自动收纳相同类型单位并在左上角显示数量（会排序）。
INI:Controls:GameOptionsPanel:chkDrawAdjacentBoundary:Text=建造边界显示
INI:Controls:GameOptionsPanel:chkDrawAdjacentBoundary:ToolTip=显示建筑的建造判定边界。
INI:Controls:GameOptionsPanel:chkShowBuildingStatistics:Text=建筑数量显示
INI:Controls:GameOptionsPanel:chkShowBuildingStatistics:ToolTip=建筑图标的右上角会显示当前拥有的该类型建筑的数量。
INI:Controls:GameOptionsPanel:chkMessageDisplayInCenter:Text=字幕居中
INI:Controls:GameOptionsPanel:chkMessageDisplayInCenter:ToolTip=直接在屏幕中央显示任务字幕，而非左上角，背景为半透明，鼠标悬浮在字幕区域时会增加其不透明度，@且在此期间不会消失（字幕区域不判断宽度，只判断高度），效果类似于RA3。
INI:Controls:GameOptionsPanel:chkEnableSelectBox:Text=单位选择框
INI:Controls:GameOptionsPanel:chkEnableSelectBox:ToolTip=选中单位后绘制选择框，且仅观战与盟友可见。
INI:Controls:GameOptionsPanel:chkEnableAutoCombatBuilding:Text=自动放置防御建筑
INI:Controls:GameOptionsPanel:chkEnableAutoCombatBuilding:ToolTip=启用后，防御建筑不需要手动点击图标放置，而是在完成建造后自动放置。其他描述同“自动放置建筑”选项。
INI:Controls:GameOptionsPanel:chkEnableAutoBuilding:Text=自动放置建筑
INI:Controls:GameOptionsPanel:chkEnableAutoBuilding:ToolTip=启用后，所有建筑不需要手动点击图标放置，而是在完成建造后自动放置。@可以从快捷键设置第一、第二集结点，自动放置的科技建筑会被随机放置在集结点附近，@防御建筑会被随机放置在第二集结点附近。即便未开启，@您仍然可以在游戏内右键主要建筑/防御建筑的选项卡或者使用快捷键以临时启用该功能。
INI:Controls:GameOptionsPanel:chkShowFlashOnSelecting:Text=单位选中闪烁
INI:Controls:GameOptionsPanel:chkShowFlashOnSelecting:ToolTip=启用后，单位被选中时会闪烁。
INI:Controls:GameOptionsPanel:chkTypeSelectUseIFVMode:Text=步兵车筛选
INI:Controls:GameOptionsPanel:chkTypeSelectUseIFVMode:ToolTip=启用后，按T键选中多功能步兵车类单位时会选中相同模式的步兵车，而不是选中所有多功能步兵车。